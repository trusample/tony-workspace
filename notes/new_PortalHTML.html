<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TruSample CRM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
header { background: linear-gradient(135deg, #1e1b4b, #312e81); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 1.4rem; color: #22d3ee; }
#user-info { margin-left: auto; font-size: 0.85rem; color: #94a3b8; }
nav { background: #1e293b; padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
nav button { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
nav button.active { background: #22d3ee; color: #0f172a; border-color: #22d3ee; font-weight: bold; }
main { padding: 24px; }
h2 { font-size: 1.2rem; color: #22d3ee; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #22d3ee; }
table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
th { background: #0e7490; color: white; padding: 12px; text-align: left; font-size: 0.85rem; }
td { padding: 10px 12px; border-bottom: 1px solid #334155; font-size: 0.85rem; }
tr:hover td { background: #263348; }
.loading { text-align: center; padding: 40px; color: #64748b; }
.card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #22d3ee; }
.card h3 { font-size: 2rem; color: #22d3ee; }
.card p { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
</style>
</head>
<body>
<header>
  <h1>🧬 TruSample CRM</h1>
  <div id="user-info">Loading...</div>
</header>
<nav>
  <button class="active" onclick="showTab('dashboard',this)">📊 Dashboard</button>
  <button onclick="showTab('contacts',this)">👥 Contacts</button>
  <button onclick="showTab('accounts',this)">🏢 Accounts</button>
  <button onclick="showTab('quotes',this)">📋 Quotes</button>
  <button onclick="showTab('orders',this)">📦 Orders</button>
  <button onclick="showTab('products',this)">🧪 Products</button>
</nav>
<main id="main"><div class="loading">Loading...</div></main>

<script>
const ENDPOINT = '<?= ScriptApp.getService().getUrl() ?>';

async function api(action) {
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    body: JSON.stringify({action}),
    headers: {'Content-Type':'application/json'}
  });
  return res.json();
}

async function init() {
  const r = await api('getCurrentUser');
  if (r.success) {
    document.getElementById('user-info').textContent = r.user.email + ' — ' + r.user.role;
  }
  showTab('dashboard', document.querySelector('nav button'));
}

async function showTab(tab, btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  if (tab === 'dashboard') {
    const [c, a, q, o] = await Promise.all([
      api('getContacts'), api('getAccounts'), api('getQuotes'), api('getOrders')
    ]);
    main.innerHTML = '<h2>Dashboard</h2><div class="grid">' +
      card('Active Contacts', (c.data||[]).length) +
      card('Accounts', (a.data||[]).length) +
      card('Quotes', (q.data||[]).length) +
      card('Orders', (o.data||[]).length) +
      '</div>';
  } else {
    const r = await api('get' + tab.charAt(0).toUpperCase() + tab.slice(1));
    const data = r.data || [];
    if (!data.length) { main.innerHTML = '<h2>' + tab + '</h2><div class="loading">No data yet</div>'; return; }
    const keys = Object.keys(data[0]).slice(0,6);
    main.innerHTML = '<h2>' + tab.charAt(0).toUpperCase() + tab.slice(1) + '</h2><table><thead><tr>' +
      keys.map(k => '<th>'+k+'</th>').join('') + '</tr></thead><tbody>' +
      data.map(row => '<tr>' + keys.map(k => '<td>'+(row[k]||'')+'</td>').join('') + '</tr>').join('') +
      '</tbody></table>';
  }
}

function card(label, val) {
  return '<div class="card"><h3>'+val+'</h3><p>'+label+'</p></div>';
}

init();
</script>
</body>
</html>
